<!DOCTYPE html>
<html lang="el">
<head>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --background-image:url("background (2).png");
      --invitation-image:url("invitation.png");
       --story-image:url("story-image.jpg");
      
      --main-color: #F7C5CD;
            --dark-color: #A16A86;
            --light-color: #FDF0E9;
      --glass-bg:rgba(255,255,255,.58);
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      font-family:Georgia, 'Times New Roman', serif;
      color:var(--dark-color);
      background:#f6f1f7;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.14), rgba(255,255,255,.22)),
        var(--background-image);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:-2;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(67,48,75,.18) 100%);
      z-index:-1;
      pointer-events:none;
    }

    .section{
      min-height:100vh;
      padding:clamp(56px, 8vw, 110px) clamp(20px, 5vw, 80px);
      display:grid;
      place-items:center;
      position:relative;
    }

    .glass{
      width:min(1100px, 100%);
      background:var(--glass-bg);
      border:1px solid rgba(255,255,255,.5);
      border-radius:32px;
      box-shadow:0 30px 80px rgba(70,50,78,.18);
      backdrop-filter:blur(12px);
    }

    .hero-card{
      padding:clamp(22px, 4vw, 46px);
      display:grid;
      grid-template-columns:1fr 1.05fr;
      gap:clamp(28px, 5vw, 70px);
      align-items:center;
    }

    .hero-text{
      text-align:center;
    }

    .eyebrow{
      font-size:clamp(12px, 1.8vw, 15px);
      letter-spacing:.22em;
      text-transform:uppercase;
      color:rgba(81,66,88,.68);
      margin-bottom:18px;
    }

    h1{
      font-size:clamp(44px, 4.5vw, 96px);
      font-weight:400;
      line-height:.95;
      margin-bottom:22px;
    }

    .hero-text p{
      font-size:clamp(17px, 2.2vw, 22px);
      line-height:1.7;
      max-width:560px;
      margin:0 auto 28px;
    }

    .date-reveal-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:clamp(14px, 2.5vw, 28px);
      width:min(760px, 100%);
      margin:0 auto;
    }

    .date-scratch-box{
      position:relative;
      min-height:180px;
      padding:24px 16px;
      border-radius:28px;
      background:rgba(255,255,255,.66);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), 0 18px 38px rgba(70,50,78,.12);
      display:grid;
      place-items:center;
      overflow:hidden;
      isolation:isolate;
    }

    .date-reveal-item{
      display:grid;
      gap:12px;
      text-align:center;
    }

    .date-label{
      font-size:13px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(81,66,88,.68);
      white-space:nowrap;
    }

    .date-scratch-box strong{
      position:relative;
      z-index:1;
      font-size:clamp(34px, 5vw, 64px);
      font-weight:400;
      line-height:1;
      color:var(--dark-color);
      text-align:center;
    }

    .date-scratch-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:3;
      border-radius:28px;
      cursor:grab;
      touch-action:none;
    }

    .date-scratch-canvas.scratched{
      pointer-events:none;
      opacity:0;
      transition:opacity .8s ease;
    }

    .date-scratch-hint{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      z-index:4;
      pointer-events:none;
      font-style:normal;
      font-size:clamp(12px, 1.8vw, 15px);
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.92);
      text-shadow:0 1px 4px rgba(60,45,70,.35);
      white-space:nowrap;
      transition:opacity .4s ease;
    }

    .date-scratch-box.revealed .date-scratch-hint{
      opacity:0;
    }

    .invitation-frame{
      padding:clamp(10px, 2vw, 18px);
      border-radius:26px;
      background:rgba(255,255,255,.72);
      box-shadow:0 24px 60px rgba(70,50,78,.22);
      transform:rotate(1.2deg);
    }

    .invitation-frame img{
      width:100%;
      max-height:82vh;
      object-fit:contain;
      display:block;
      border-radius:18px;
    }

    .date-reveal-card{
      padding:clamp(34px, 6vw, 70px);
      text-align:center;
    }

    .date-note{
      margin-top:24px;
      font-size:clamp(15px, 2vw, 19px);
      line-height:1.7;
      color:rgba(81,66,88,.74);
    }

    .countdown-card{
      padding:clamp(34px, 6vw, 70px);
      text-align:center;
    }

    .section-title{
      font-size:clamp(34px, 5vw, 62px);
      font-weight:400;
      margin-bottom:18px;
    }

    .section-subtitle{
      font-size:clamp(16px, 2vw, 21px);
      line-height:1.7;
      max-width:720px;
      margin:0 auto 38px;
      color:rgba(81,66,88,.78);
    }

    .countdown-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:clamp(12px, 2vw, 24px);
    }

    .time-box{
      position:relative;
      overflow:hidden;
      padding:clamp(20px, 4vw, 34px) 12px;
      border-radius:24px;
      background:rgba(255,255,255,.66);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.5), 0 18px 38px rgba(70,50,78,.12);
      isolation:isolate;
    }

    .scratch-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:5;
      cursor:grab;
      touch-action:none;
      border-radius:24px;
    }

    .scratch-canvas.scratched{
      pointer-events:none;
      opacity:0;
      transition:opacity .8s ease;
    }

    .scratch-hint{
      position:absolute;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      z-index:6;
      pointer-events:none;
      font-size:10px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,.88);
      text-shadow:0 1px 3px rgba(60,45,70,.28);
      transition:opacity .4s ease;
      white-space:nowrap;
    }

    .time-box.revealed .scratch-hint{
      opacity:0;
    }

    .time-box strong{
      display:block;
      font-size:clamp(34px, 6vw, 72px);
      font-weight:400;
      line-height:1;
      margin-bottom:10px;
    }

    .time-box span{
      font-size:clamp(12px, 1.6vw, 15px);
      text-transform:uppercase;
      letter-spacing:.14em;
      color:rgba(81,66,88,.66);
    }

    .story-card{
      padding:clamp(24px, 5vw, 56px);
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:clamp(28px, 5vw, 64px);
      align-items:center;
    }

   .story-image{
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 24px 60px rgba(70,50,78,.22);
  height:560px;
  background:
    linear-gradient(rgba(212,200,213,.10), rgba(212,200,213,.10)),
    var(--story-image);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-color:rgba(255,255,255,.55);
}

    .story-text h2{
      font-size:clamp(34px, 5vw, 62px);
      font-weight:400;
      margin-bottom:22px;
    }

    .story-text p{
      font-size:clamp(16px, 2vw, 21px);
      line-height:1.85;
      margin-bottom:18px;
      color:rgba(81,66,88,.82);
    }

    .rsvp-card{
      padding:clamp(28px, 5vw, 60px);
      text-align:center;
    }

    .rsvp-form{
      margin:34px auto 0;
      max-width:760px;
      display:grid;
      gap:18px;
      text-align:left;
    }

    .form-row{
      display:grid;
      
      gap:18px;
    }

    label{
      display:grid;
      gap:8px;
      font-size:14px;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:rgba(81,66,88,.7);
    }

    input,
    select,
    textarea{
      width:100%;
      border:0;
      outline:none;
      border-radius:18px;
      padding:16px 18px;
      background:rgba(255,255,255,.76);
      box-shadow:inset 0 0 0 1px rgba(81,66,88,.12);
      font:inherit;
      color:var(--dark-color);
    }

    textarea{
      min-height:130px;
      resize:vertical;
    }

    .submit-button{
      border:0;
      border-radius:999px;
      padding:17px 30px;
      background:var(--dark-color);
      color:white;
      font-size:16px;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 18px 36px rgba(70,50,78,.24);
      transition:transform .25s ease, opacity .25s ease;
    }

    .submit-button:hover{
      transform:translateY(-2px);
      opacity:.92;
    }

    .small-note{
      margin-top:16px;
      font-size:14px;
      color:rgba(81,66,88,.62);
      text-align:center;
      line-height:1.6;
    }

    .success-message{
      display:none;
      margin-top:22px;
      padding:18px;
      border-radius:18px;
      background:rgba(212,200,213,.62);
      text-align:center;
      line-height:1.6;
    }

    .success-message.show{
      display:block;
    }

    @media (max-width:820px){
      .hero-card,
      .story-card{
        grid-template-columns:1fr;
      }

      .invitation-frame{
        transform:none;
      }


      .countdown-grid{
        grid-template-columns:repeat(2, 1fr);
      }
    }

    @media (max-width:620px){
      .date-reveal-grid{
        grid-template-columns:repeat(3, 1fr);
        gap:8px;
        max-width:100%;
      }

      .date-scratch-box{
        min-height:105px;
        padding:18px 6px 12px;
        border-radius:18px;
      }
      .date-reveal-item{
        gap:8px;
      }

      .date-label{
        font-size:9px;
        letter-spacing:.1em;
      }

      .date-scratch-box strong{
        font-size:clamp(22px, 8vw, 34px);
      }

      .date-scratch-canvas{
        border-radius:18px;
      }

      .date-scratch-hint{
        font-size:9px;
        letter-spacing:.08em;
      }
    }

    @media (max-width:380px){
      .date-reveal-grid{
        gap:6px;
      }

      .date-scratch-box{
        min-height:92px;
        padding:16px 4px 10px;
      }

      .date-scratch-box strong{
        font-size:clamp(20px, 5vw, 30px);
      }
    }
.timeline-card{
  padding:clamp(34px, 6vw, 70px);
  text-align:center;
}

.timeline-list{
  position:relative;
  width:min(860px, 100%);
  margin:46px auto 0;
  display:grid;
  gap:26px;
}

.timeline-list::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:1px;
  transform:translateX(-50%);
  background:rgba(81,66,88,.18);
}

.timeline-item{
  position:relative;
  width:50%;
  display:flex;
}

.timeline-item:nth-child(odd){
  justify-self:start;
  justify-content:flex-end;
  padding-right:42px;
  text-align:right;
}

.timeline-item:nth-child(even){
  justify-self:end;
  justify-content:flex-start;
  padding-left:42px;
  text-align:left;
}

.timeline-item::before{
  content:"";
  position:absolute;
  top:36px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--dark-color);
  z-index:3;
}

.timeline-item::after{
  content:"";
  position:absolute;
  top:39px;
  width:28px;
  height:1px;
  background:rgba(81,66,88,.28);
  z-index:2;
}

.timeline-item:nth-child(odd)::before{
  right:-4px;
}

.timeline-item:nth-child(odd)::after{
  right:4px;
}

.timeline-item:nth-child(even)::before{
  left:-4px;
}

.timeline-item:nth-child(even)::after{
  left:4px;
}

.timeline-card-item{
  width:min(360px, 100%);
  display:flex;
  gap:18px;
  align-items:center;
  background:transparent;
  box-shadow:none;
  padding:0;
  border-radius:0;
}

.timeline-item:nth-child(odd) .timeline-card-item{
  flex-direction:row-reverse;
}

.timeline-icon{
  width:76px;
  height:76px;
  flex:0 0 76px;
  display:grid;
  place-items:center;
  border-radius:0;
  background:transparent;
  color:var(--dark-color);
}

.timeline-icon svg{
  width:68px;
  height:68px;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.timeline-time{
  display:block;
  margin-bottom:5px;
  font-size:clamp(16px, 2vw, 22px);
  color:rgba(81,66,88,.66);
  font-weight:400;
  letter-spacing:.08em;
  line-height:1;
}

.timeline-card-item h3{
  font-size:clamp(18px, 2.2vw, 24px);
  font-weight:400;
  margin-bottom:0;
}

/* Tablet & mobile */
@media (max-width:820px){
  .timeline-list::before{
    left:16px;
  }

  .timeline-item,
  .timeline-item:nth-child(odd),
  .timeline-item:nth-child(even){
    width:100%;
    justify-self:stretch;
    justify-content:flex-start;
    padding-left:42px;
    padding-right:0;
    text-align:left;
  }

  .timeline-item::before,
  .timeline-item:nth-child(odd)::before,
  .timeline-item:nth-child(even)::before{
    left:12px;
    right:auto;
    top:30px;
  }

  .timeline-item::after,
  .timeline-item:nth-child(odd)::after,
  .timeline-item:nth-child(even)::after{
    left:20px;
    right:auto;
    top:33px;
    width:16px;
  }

  .timeline-item:nth-child(odd) .timeline-card-item{
    flex-direction:row;
  }
}

/* Small mobile */
@media (max-width:520px){
  .timeline-card{
    padding:24px 16px;
  }

  .timeline-list{
    gap:16px;
    margin-top:30px;
  }

  .timeline-list::before{
    left:12px;
  }

  .timeline-item,
  .timeline-item:nth-child(odd),
  .timeline-item:nth-child(even){
    padding-left:34px;
  }

  .timeline-item::before,
  .timeline-item:nth-child(odd)::before,
  .timeline-item:nth-child(even)::before{
    left:8px;
    top:26px;
    width:7px;
    height:7px;
  }

  .timeline-item::after,
  .timeline-item:nth-child(odd)::after,
  .timeline-item:nth-child(even)::after{
    left:15px;
    top:29px;
    width:13px;
  }

  .timeline-card-item{
    width:100%;
    gap:10px;
  }

  .timeline-icon{
    width:48px;
    height:48px;
    flex-basis:48px;
  }

  .timeline-icon svg{
    width:44px;
    height:44px;
  }

  .timeline-time{
    font-size:14px;
  }

  .timeline-card-item h3{
    font-size:17px;
  }
}

    }

<body>
  <section class="section hero-section" id="invitation">
  
    
      <div class="invitation-frame">
         <picture>
        <!-- Mobile image -->
        <source media="(max-width: 768px)" srcset="invitation.png" />

        <!-- Desktop image -->
        <img src="invitation.png" alt="Wedding invitation" />
      </picture>
      </div>
   
<a href="#date-reveal" class="scroll-down-arrow">
    <i class="fa-solid fa-chevron-down"></i>
</a>
  </section>

  <section class="section rsvp-section" id="rsvp">
    <div class="glass rsvp-card">
      
      <h2 class="section-title">Θα παρευρεθείτε;</h2>
      <p class="section-subtitle">
        Παρακαλούμε ενημερώστε μας αν θα μπορέσετε να είστε μαζί μας,
        ώστε να οργανώσουμε την ημέρα μας με τον καλύτερο τρόπο.
      </p>

      <!-- Βάλε εδώ το Formspree endpoint σου στο action -->
      <form class="rsvp-form" id="rsvpForm" action="https://formspree.io/f/mkolvpdl" method="POST">
        <div class="form-row">
          <label>
            Ονοματεπώνυμο
            <input type="text" name="name" placeholder="π.χ. Μαρία Παπαδοπούλου" required />
          </label>

  
        </div>

        <div class="form-row">
        
          <label>
            Θα παρευρεθείτε;
            <select name="attendance" required>
              <option value="">Επιλέξτε απάντηση</option>
              <option value="Ναι, θα παρευρεθώ">Ναι, θα παρευρεθώ</option>
              <option value="Όχι, δεν θα παρευρεθώ">Όχι, δεν θα παρευρεθώ</option>
            </select>
          </label>
        </div>

        <div class="form-row">
          <label>
            Αριθμός ατόμων
            <input type="number" name="guests" min="1" max="10" placeholder="π.χ. 2" />
          </label>

       
        </div>
        <button class="submit-button" type="button" onclick="submitRsvpForm()">
  Αποστολή
</button>

      </form>

      <div class="success-message" id="successMessage">
        Ευχαριστούμε πολύ! Η απάντησή σας καταχωρήθηκε.
      </div>
    </div>
  </section>

  <script>
  
  /* =========================
     GOOGLE CALENDAR BUTTON
  ========================= */

  const calendarButton = document.getElementById("googleCalendarButton");

  if(calendarButton){
    const eventTitle = "Γάμος Θάνου & Ειρήνης";
    const eventDetails = "Με πολλή χαρά σας προσκαλούμε στον γάμο μας.";
    const eventLocation = "Άγιος Δημήτριος Ελασσόνας";

    const googleCalendarUrl =
      "https://calendar.google.com/calendar/render?action=TEMPLATE" +
      "&text=" + encodeURIComponent(eventTitle) +
      "&dates=20260717T190000/20260718T000000" +
      "&details=" + encodeURIComponent(eventDetails) +
      "&location=" + encodeURIComponent(eventLocation) +
      "&ctz=Europe/Athens";

    calendarButton.href = googleCalendarUrl;
  }


  /* =========================
     COUNTDOWN
  ========================= */

  const weddingDate = new Date("2026-07-17T19:00:00").getTime();

  const daysEl = document.getElementById("days");
  const hoursEl = document.getElementById("hours");
  const minutesEl = document.getElementById("minutes");
  const secondsEl = document.getElementById("seconds");

  function updateCountdown(){
    if(!daysEl || !hoursEl || !minutesEl || !secondsEl) return;

    const now = new Date().getTime();
    const distance = weddingDate - now;

    if(distance <= 0){
      daysEl.textContent = "0";
      hoursEl.textContent = "0";
      minutesEl.textContent = "0";
      secondsEl.textContent = "0";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    daysEl.textContent = days;
    hoursEl.textContent = hours;
    minutesEl.textContent = minutes;
    secondsEl.textContent = seconds;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);


  /* =========================
     SCRATCH EFFECT ΣΤΟ COUNTDOWN
  ========================= */

  function setupCountdownScratch(){
    const canvases = document.querySelectorAll(".scratch-canvas");

    if(!canvases.length) return;

    canvases.forEach((canvas) => {
      const box = canvas.closest(".scratch-box");
      const ctx = canvas.getContext("2d");

      if(!box || !ctx) return;

      let isDrawing = false;

      function resizeCanvas(){
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        if(rect.width === 0 || rect.height === 0) return;

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawCover(rect.width, rect.height);
      }

      function drawCover(width, height){
        const gradient = ctx.createLinearGradient(0, 0, width, height);

        gradient.addColorStop(0, "rgba(232, 224, 233, .92)");
        gradient.addColorStop(.45, "rgba(212, 200, 213, .98)");
        gradient.addColorStop(1, "rgba(169, 149, 173, .92)");

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(255,255,255,.22)";

        for(let i = 0; i < 130; i++){
          const x = Math.random() * width;
          const y = Math.random() * height;
          const radius = Math.random() * 1.8 + .4;

          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function getPointerPosition(event){
        const rect = canvas.getBoundingClientRect();
        const point = event.touches ? event.touches[0] : event;

        return {
          x: point.clientX - rect.left,
          y: point.clientY - rect.top
        };
      }

      function scratch(event){
        if(!isDrawing) return;

        event.preventDefault();

        const position = getPointerPosition(event);

        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(position.x, position.y, 22, 0, Math.PI * 2);
        ctx.fill();

        checkRevealProgress();
      }

      function checkRevealProgress(){
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let transparentPixels = 0;

        for(let i = 3; i < imageData.length; i += 4){
          if(imageData[i] < 80){
            transparentPixels++;
          }
        }

        const totalPixels = canvas.width * canvas.height;
        const scratchedRatio = transparentPixels / totalPixels;

        if(scratchedRatio > .42){
          canvas.classList.add("scratched");
          box.classList.add("revealed");
        }
      }

      canvas.addEventListener("mousedown", function(event){
        isDrawing = true;
        scratch(event);
      });

      window.addEventListener("mouseup", function(){
        isDrawing = false;
      });

      canvas.addEventListener("mousemove", scratch);

      canvas.addEventListener("touchstart", function(event){
        isDrawing = true;
        scratch(event);
      }, { passive:false });

      canvas.addEventListener("touchend", function(){
        isDrawing = false;
      });

      canvas.addEventListener("touchmove", scratch, { passive:false });

      resizeCanvas();

      window.addEventListener("resize", resizeCanvas);
    });
  }

  setupCountdownScratch();


  /* =========================
     RSVP FORM + REDIRECT
  ========================= */

  async function submitRsvpForm(){
    const rsvpForm = document.getElementById("rsvpForm");

    if(!rsvpForm){
      alert("Δεν βρέθηκε η φόρμα.");
      return;
    }

    if(!rsvpForm.reportValidity()){
      return;
    }

    const formData = new FormData(rsvpForm);

    try{
      const response = await fetch(rsvpForm.action, {
        method:"POST",
        body:formData,
        headers:{
          "Accept":"application/json"
        }
      });

      if(response.ok){
        window.location.href = "thank-you.html";
      }else{
        alert("Υπήρξε πρόβλημα με την αποστολή. Δοκιμάστε ξανά.");
      }
    }catch(error){
      console.error(error);
      alert("Υπήρξε πρόβλημα με την αποστολή. Δοκιμάστε ξανά.");
    }
  }

  </script>
</body>
</html>
